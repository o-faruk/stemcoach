<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEMCoach — AI Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F4EE;
      --ink: #1A1814;
      --ink2: #4A4640;
      --accent: #2A5FD4;
      --accent-light: #EBF0FC;
      --green: #1A7A50;
      --green-light: #E6F4EE;
      --border: rgba(26,24,20,0.12);
      --card: #FFFFFF;
    }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      background: var(--cream); flex-shrink: 0;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
    .logo span { color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.1rem; border-radius: 7px; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; text-decoration: none;
      border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
    .btn-outline:hover { border-color: var(--ink2); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #1e4fb0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* SETUP */
    #setup {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .setup-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 520px;
      box-shadow: 0 2px 20px rgba(26,24,20,0.07);
    }
    .setup-box h1 {
      font-family: 'DM Serif Display', serif; font-size: 1.7rem;
      letter-spacing: -0.02em; margin-bottom: 0.4rem;
    }
    .setup-box p { color: var(--ink2); font-size: 0.9rem; margin-bottom: 1.75rem; }

    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 2rem; text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative; margin-bottom: 1rem;
    }
    .upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone p { font-size: 0.88rem; color: var(--ink2); margin-top: 0.4rem; }

    .file-badge {
      display: none; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1rem; background: var(--green-light);
      border-radius: 8px; font-size: 0.85rem; color: var(--green);
      font-weight: 500; margin-bottom: 1rem;
    }

    label { font-size: 0.82rem; font-weight: 600; display: block; margin-bottom: 0.35rem; }
    input[type=text], textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; color: var(--ink); background: var(--cream);
      outline: none; transition: border-color 0.15s; margin-bottom: 1rem;
    }
    input[type=text]:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 80px; resize: vertical; }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }

    /* CHAT */
    #chat { flex: 1; display: none; flex-direction: column; min-height: 0; }

    .chat-header {
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      background: var(--card); display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .chat-header-info h2 { font-size: 1rem; font-weight: 600; }
    .chat-header-info p { font-size: 0.8rem; color: var(--ink2); }

    .messages {
      flex: 1; overflow-y: auto; padding: 1.5rem 2rem;
      display: flex; flex-direction: column; gap: 1.25rem;
    }

    .msg { display: flex; gap: 0.75rem; max-width: 85%; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0; margin-top: 2px;
    }
    .tutor-avatar { background: var(--accent); color: white; font-weight: 700; }
    .user-avatar { background: var(--ink); color: var(--cream); font-weight: 700; }

    .msg-bubble {
      padding: 0.85rem 1.1rem; border-radius: 12px;
      font-size: 0.92rem; line-height: 1.65;
    }
    .msg.tutor .msg-bubble {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px 12px 12px 4px;
    }
    .msg.user .msg-bubble {
      background: var(--accent); color: white;
      border-radius: 12px 12px 4px 12px;
    }

    .typing-indicator {
      display: none; align-self: flex-start;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.85rem 1.1rem;
      margin-left: 44px;
    }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ink2); animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .chat-input-area {
      padding: 1rem 2rem; border-top: 1px solid var(--border);
      background: var(--card); flex-shrink: 0;
    }
    .input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .chat-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; resize: none; outline: none; max-height: 120px;
      transition: border-color 0.15s; background: var(--cream); color: var(--ink);
      line-height: 1.5;
    }
    .chat-input:focus { border-color: var(--accent); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--accent); color: white; border: none;
      cursor: pointer; font-size: 1.1rem; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { background: #1e4fb0; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-hint { font-size: 0.75rem; color: var(--ink2); margin-top: 0.5rem; }

    @media (max-width: 600px) {
      .messages { padding: 1rem; }
      .chat-input-area { padding: 0.75rem 1rem; }
      nav { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">STEM<span>Coach</span> <span style="font-size:0.8rem;font-weight:500;color:var(--ink2);font-family:'DM Sans',sans-serif;">Tutor</span></div>
  <div style="display:flex;gap:0.75rem;">
    <a href="/dashboard" class="btn btn-outline">← Dashboard</a>
  </div>
</nav>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <h1>Start a tutor session</h1>
    <p>Upload your notes or exam and chat with an AI tutor that knows your material.</p>

    <div class="upload-zone">
      <input type="file" id="file-input" accept=".pdf" />
      <div style="font-size:1.75rem;">📚</div>
      <p>Drop your PDF here or click to upload</p>
    </div>
    <div class="file-badge" id="file-badge">✓ <span id="file-name"></span></div>

    <label>Or paste your notes / exam text</label>
    <textarea id="material-text" placeholder="Paste lecture notes, textbook sections, past exam questions..."></textarea>

    <label>Course name</label>
    <input type="text" id="course-name" placeholder="e.g. CSE3150, Calculus II, Organic Chemistry" />

    <label>Weak topics (optional)</label>
    <input type="text" id="weak-topics" placeholder="e.g. Pointers, Recursion, Sorting algorithms" />

    <button class="btn btn-accent" id="start-btn" onclick="startSession()" style="width:100%;justify-content:center;padding:0.85rem;">
      <span class="btn-text">Start Session →</span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-header-info">
      <h2 id="chat-course-name">Tutor Session</h2>
      <p id="chat-subtitle">Ask anything about your material</p>
    </div>
    <button class="btn btn-outline" onclick="newSession()" style="font-size:0.8rem;">New Session</button>
  </div>

  <div class="messages" id="messages">
    <div class="typing-indicator" id="typing">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea class="chat-input" id="chat-input" placeholder="Ask a question, request an explanation, or say 'quiz me'..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) { window.location.href = '/login'; }

  let session = {
    materialText: '',
    courseName: '',
    weakTopics: [],
    chatHistory: [],
  };

  // File upload
  document.getElementById('file-input').addEventListener('change', function() {
    if (this.files[0]) {
      document.getElementById('file-name').textContent = this.files[0].name;
      document.getElementById('file-badge').style.display = 'flex';
    }
  });

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) btn.classList.add('loading');
    else btn.classList.remove('loading');
  }

  async function startSession() {
    const file = document.getElementById('file-input').files[0];
    const text = document.getElementById('material-text').value.trim();
    const courseName = document.getElementById('course-name').value.trim() || 'My Course';
    const weakInput = document.getElementById('weak-topics').value.trim();
    const weakTopics = weakInput ? weakInput.split(',').map(t => t.trim()).filter(Boolean) : [];

    if (!file && !text) { alert('Please upload a PDF or paste some material.'); return; }

    setLoading('start-btn', true);

    try {
      const formData = new FormData();
      if (file) formData.append('file', file);
      if (text) formData.append('text', text);
      formData.append('course_name', courseName);
      formData.append('weak_topics', JSON.stringify(weakTopics));

      const res = await fetch('/tutor/start', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('Failed');
      const data = await res.json();

      session.materialText = data.material_text || text || '';
      session.courseName = courseName;
      session.weakTopics = weakTopics;
      session.chatHistory = [];

      // Switch to chat
      document.getElementById('setup').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      document.getElementById('chat-course-name').textContent = courseName;

      // Add tutor opening message
      addMessage('tutor', data.message);
      session.chatHistory.push({ role: 'assistant', content: data.message });

    } catch(e) {
      alert('Something went wrong. Please try again.');
    } finally {
      setLoading('start-btn', false);
    }
  }

  function addMessage(role, text) {
    const messages = document.getElementById('messages');
    const typing = document.getElementById('typing');

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const initial = role === 'tutor' ? 'T' : 'Me';
    const avatarClass = role === 'tutor' ? 'tutor-avatar' : 'user-avatar';

    div.innerHTML = `
      <div class="msg-avatar ${avatarClass}">${initial}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
    `;

    messages.insertBefore(div, typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping(show) {
    const typing = document.getElementById('typing');
    typing.style.display = show ? 'flex' : 'none';
    if (show) {
      const messages = document.getElementById('messages');
      messages.scrollTop = messages.scrollHeight;
    }
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    addMessage('user', message);
    session.chatHistory.push({ role: 'user', content: message });
    showTyping(true);

    try {
      const formData = new URLSearchParams();
      formData.append('message', message);
      formData.append('chat_history', JSON.stringify(session.chatHistory.slice(-12)));
      formData.append('material_text', session.materialText.slice(0, 5000));
      formData.append('course_name', session.courseName);
      formData.append('weak_topics', JSON.stringify(session.weakTopics));

      const res = await fetch('/tutor/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData,
      });
      const data = await res.json();

      showTyping(false);
      addMessage('tutor', data.message);
      session.chatHistory.push({ role: 'assistant', content: data.message });

    } catch(e) {
      showTyping(false);
      addMessage('tutor', 'Sorry, something went wrong. Please try again.');
    } finally {
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function newSession() {
    session = { materialText: '', courseName: '', weakTopics: [], chatHistory: [] };
    document.getElementById('messages').innerHTML = '<div class="typing-indicator" id="typing"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    document.getElementById('chat').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
  }
</script>
</body>
</html>
